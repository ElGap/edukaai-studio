# Bandit configuration for security scanning

skips:
  # Skip checks that are too noisy for this codebase
  - B101  # assert_used - we use asserts in tests
  - B311  # random - we don't use random for security
  - B403  # import_pwdlib - false positive for common imports

exclude_dirs:
  - tests
  - .venv
  - __pycache__
  - .pytest_cache
  - .git
  - build
  - dist
  - outputs

# Severity levels
severity_levels:
  LOW: [B301, B302, B303, B304, B305, B306]
  MEDIUM: [B101, B102, B103, B104, B105, B106, B107, B108, B110, B112, B201, B501, B502, B503, B504, B505, B506, B507, B508]
  HIGH: [B307, B308, B309, B310, B312, B313, B314, B315, B316, B317, B318, B319, B320, B601, B602, B603, B604, B605, B606, B607, B608, B609, B610, B611, B612, B701, B702, B703]

# Specific file patterns
per_file_config:
  # Allow subprocess in training_monitor.py (it's intentional)
  "*/training_monitor.py":
    skips:
      - B605  # start_process_with_a_shell
      - B607  # start_process_with_partial_path

# Ignore false positives
ignore_nosec: False

# Report format
format: txt
output: bandit_report.txt
